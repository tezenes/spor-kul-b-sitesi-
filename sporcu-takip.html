<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPÜ Spor Kulübü - Sporcu Takip</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f1e;--sidebar:#0d1628;--card:#111827;--card2:#1a2236;
  --border:#1e2d4a;--primary:#c8102e;--accent:#f0c040;--cyan:#1a3a6e;
  --text:#e2e8f0;--muted:#64748b;--success:#10b981;--danger:#ef4444;
  --warning:#f59e0b;--radius:10px;--trans:.2s ease;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;min-height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:220px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;height:100vh;z-index:100;transition:transform var(--trans)}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.logo-text{font-size:13px;font-weight:700;color:var(--accent);line-height:1.2}
.logo-sub{font-size:10px;color:var(--muted);line-height:1.2}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background var(--trans);border-left:3px solid transparent;font-size:13px;color:var(--muted);position:relative;user-select:none}
.nav-item:hover{background:rgba(200,16,46,.1);color:var(--text)}
.nav-item.active{background:rgba(200,16,46,.15);color:var(--accent);border-left-color:var(--accent)}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
.nav-dot{width:7px;height:7px;background:var(--danger);border-radius:50%;position:absolute;right:12px;top:50%;transform:translateY(-50%)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center}

/* MAIN */
#main{margin-left:220px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar-title{font-size:18px;font-weight:700;color:var(--text)}
#topbar-sub{font-size:12px;color:var(--muted);margin-top:2px}
#topbar-actions{display:flex;gap:8px;align-items:center}
#hamburger{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px}
#page-content{flex:1;overflow-y:auto;padding:24px}

/* BUTTONS */
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-accent{background:var(--accent);color:#0a0f1e}
.btn-accent:hover{background:#d4a800}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#059669}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
.stat-card.accent::before{background:var(--accent)}
.stat-card.success::before{background:var(--success)}
.stat-card.danger::before{background:var(--danger)}
.stat-card.cyan::before{background:var(--cyan)}
.stat-val{font-size:28px;font-weight:800;color:var(--text);line-height:1}
.stat-label{font-size:12px;color:var(--muted);margin-top:6px}
.stat-icon{position:absolute;right:16px;top:16px;font-size:28px;opacity:.25}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* ATHLETE CARDS */
.athlete-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all var(--trans);text-align:center}
.athlete-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,16,46,.15)}
.avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin:0 auto 10px;background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-sm{width:36px;height:36px;font-size:13px}
.athlete-name{font-size:14px;font-weight:700;color:var(--text)}
.athlete-branch{font-size:12px;color:var(--muted);margin-top:2px}
.athlete-age{font-size:11px;color:var(--muted)}
.att-bar-wrap{margin-top:8px;background:var(--card2);border-radius:4px;height:4px;overflow:hidden}
.att-bar{height:4px;background:var(--success);border-radius:4px;transition:width .4s}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(16,185,129,.15);color:var(--success);border:1px solid rgba(16,185,129,.3)}
.badge-danger{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.badge-warning{background:rgba(245,158,11,.15);color:var(--warning);border:1px solid rgba(245,158,11,.3)}
.badge-primary{background:rgba(200,16,46,.15);color:var(--primary);border:1px solid rgba(200,16,46,.3)}
.badge-accent{background:rgba(240,192,64,.15);color:var(--accent);border:1px solid rgba(240,192,64,.3)}
.badge-cyan{background:rgba(6,214,240,.15);color:var(--cyan);border:1px solid rgba(6,214,240,.3)}
.badge-muted{background:rgba(100,116,139,.15);color:var(--muted);border:1px solid rgba(100,116,139,.3)}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:600}
.form-control{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border var(--trans)}
.form-control:focus{border-color:var(--primary)}
select.form-control option{background:var(--card)}
textarea.form-control{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* RADIO GROUP */
.radio-group{display:flex;gap:8px;flex-wrap:wrap}
.radio-opt{display:none}
.radio-label{padding:7px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:all var(--trans);color:var(--muted)}
.radio-opt:checked+.radio-label{border-color:var(--primary);background:rgba(200,16,46,.15);color:var(--primary)}

/* SEARCH & FILTER */
.search-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;color:var(--text);font-size:13px;outline:none;transition:border var(--trans);flex:1;min-width:180px}
.search-input:focus{border-color:var(--primary)}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;color:var(--muted);transition:all var(--trans);user-select:none}
.chip:hover{border-color:var(--primary);color:var(--text)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* ATTENDANCE */
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.att-row{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.att-info{flex:1}
.att-name{font-size:13px;font-weight:600}
.att-branch-tag{font-size:11px;color:var(--muted)}
.att-toggle{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;transition:all var(--trans)}
.att-toggle.present{background:rgba(16,185,129,.15);color:var(--success);border:1px solid var(--success)}
.att-toggle.absent{background:rgba(239,68,68,.1);color:var(--muted);border:1px solid var(--border)}

/* DATE NAV */
.date-nav{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 14px}
.date-nav-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 4px;transition:color var(--trans)}
.date-nav-btn:hover{color:var(--accent)}
#att-date-display{font-size:14px;font-weight:700;color:var(--accent);min-width:160px;text-align:center}

/* DEV NOTES */
.dev-note{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.dev-note-body{flex:1}
.dev-note-text{font-size:13px;color:var(--text);line-height:1.5}
.dev-note-meta{font-size:11px;color:var(--muted);margin-top:4px}
.dev-note-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:16px;transition:color var(--trans)}
.dev-note-del:hover{color:var(--danger)}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--card2);color:var(--muted);font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background var(--trans)}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody td{padding:10px 12px;color:var(--text);vertical-align:middle}
tbody tr:last-child{border-bottom:none}

/* PROGRESS */
.progress-wrap{background:var(--card2);border-radius:4px;height:8px;overflow:hidden;flex:1}
.progress-bar{height:8px;background:var(--primary);border-radius:4px;transition:width .4s}
.progress-bar.success{background:var(--success)}
.progress-bar.danger{background:var(--danger)}
.progress-bar.warning{background:var(--warning)}
.progress-bar.accent{background:var(--accent)}

/* CHART */
.chart-wrap{position:relative;width:100%;padding-top:0}
.chart-wrap canvas{max-height:280px}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab-btn{padding:10px 20px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid transparent;transition:all var(--trans);margin-bottom:-1px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity var(--trans)}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;transform:translateY(20px);transition:transform var(--trans)}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;transition:color var(--trans);line-height:1}
.modal-close:hover{color:var(--danger)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:56px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-text{font-size:13px;margin-bottom:18px}

/* GOALS */
.goal-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.goal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.goal-label{font-size:13px;font-weight:700}
.goal-values{font-size:12px;color:var(--muted);margin-bottom:6px}
.goal-footer{display:flex;align-items:center;gap:10px;margin-top:8px}
.goal-days{font-size:11px;color:var(--muted)}

/* INJURY / COMP */
.injury-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.injury-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.injury-title{font-size:13px;font-weight:700}
.injury-desc{font-size:12px;color:var(--muted);margin-top:3px}
.injury-dates{font-size:11px;color:var(--muted);margin-top:4px}

/* MEDAL */
.medal-1{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.medal-2{background:linear-gradient(135deg,#C0C0C0,#a0a0a0);color:#000;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.medal-3{background:linear-gradient(135deg,#CD7F32,#8B4513);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.medal-other{background:var(--card2);color:var(--muted);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* DIVIDER */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* SECTION TITLE */
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{transform:translateX(-220px)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  #hamburger{display:block}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .form-row,.form-row-3{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr 1fr}
  #page-content{padding:14px}
}

/* TOGGLE */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:all var(--trans)}
.toggle-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:all var(--trans)}
.toggle input:checked+.toggle-slider{background:var(--success)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}

/* OVERLAY for sidebar on mobile */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#sidebar-overlay.show{display:block}
</style>
</head>
<body>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">DPÜ</div>
    <div>
      <div class="logo-text">DPÜ Spor Kulübü</div>
      <div class="logo-sub">Sporcu Takip Sistemi</div>
    </div>
  </div>
  <div class="sidebar-nav" id="sidebar-nav"></div>
  <div class="sidebar-footer">v1.0 &copy; 2025 DPÜ SK</div>
</nav>

<div id="main">
  <div id="topbar">
    <button id="hamburger" onclick="toggleSidebar()" aria-label="Menüyü aç/kapat" aria-expanded="false">☰</button>
    <div>
      <div id="topbar-title">Ana Sayfa</div>
      <div id="topbar-sub" id="topbar-sub"></div>
    </div>
    <div id="topbar-actions"></div>
  </div>
  <div id="page-content"></div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-athlete"><div class="modal" id="modal-athlete-inner"></div></div>
<div class="modal-overlay" id="modal-detail"><div class="modal" id="modal-detail-inner"></div></div>
<div class="modal-overlay" id="modal-generic"><div class="modal" id="modal-generic-inner"></div></div>

<script>
// ============================================================
// DATA STORE
// ============================================================
const STORAGE_KEY = 'dpu_sporcu_v1';
const BRANCHES = ['Yüzme','Basketbol','Voleybol','Tenis','Masa Tenisi','Pilates','Zumba','Jimnastik'];

const DEFAULT_MEASURE_TYPES = [
  {id:'mt1',name:'Boy',unit:'cm',higherIsBetter:true,category:'Genel'},
  {id:'mt2',name:'Kilo',unit:'kg',higherIsBetter:false,category:'Genel'},
  {id:'mt3',name:'Beden Yağı',unit:'%',higherIsBetter:false,category:'Genel'},
  {id:'mt4',name:'Kondisyon Dayanıklılığı',unit:'dk',higherIsBetter:true,category:'Performans'},
  {id:'mt5',name:'Esneklik',unit:'cm',higherIsBetter:true,category:'Performans'},
  {id:'mt6',name:'Havuz/Saha Süresi',unit:'sn',higherIsBetter:false,category:'Performans'},
];

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      if(!d.measureTypes||d.measureTypes.length===0) d.measureTypes=[...DEFAULT_MEASURE_TYPES];
      return d;
    }
  }catch(e){}
  return {athletes:[],attendance:[],development:[],measurements:[],measureTypes:[...DEFAULT_MEASURE_TYPES],goals:[],competitions:[],injuries:[]};
}

function saveData(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));
}

let DB=loadData();
window.appCharts={};

// ============================================================
// UTILS
// ============================================================
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function today(){return new Date().toISOString().split('T')[0]}
function formatDate(d){
  if(!d)return '-';
  const months=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const dt=new Date(d+'T00:00:00');
  return dt.getDate()+' '+months[dt.getMonth()]+' '+dt.getFullYear();
}
function getAge(birthDate){
  if(!birthDate)return '-';
  const diff=Date.now()-new Date(birthDate).getTime();
  return Math.floor(diff/31557600000);
}
function getInitials(name){
  if(!name)return '?';
  const p=name.trim().split(/\s+/);
  if(p.length>=2)return (p[0][0]+p[p.length-1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}
function getAttRate(athleteId,days=30){
  const end=new Date();const start=new Date();start.setDate(start.getDate()-days);
  const recs=DB.attendance.filter(a=>a.athleteId===athleteId&&new Date(a.date)>=start&&new Date(a.date)<=end);
  if(!recs.length)return null;
  return Math.round(recs.filter(a=>a.present).length/recs.length*100);
}
function destroyChart(key){
  if(window.appCharts[key]){try{window.appCharts[key].destroy()}catch(e){}delete window.appCharts[key]}
}
function escHtml(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function getAthlete(id){return DB.athletes.find(a=>a.id===id)}
function athleteName(id){const a=getAthlete(id);return a?a.name:'?'}
function getMeasureType(id){return DB.measureTypes.find(t=>t.id===id)}
function avatarHtml(athlete,size=''){
  const cls='avatar'+(size?' avatar-'+size:'');
  if(athlete.photo){return `<div class="${cls}"><img src="${escHtml(athlete.photo)}" alt=""></div>`}
  const colors=[['#c8102e','#1a3a6e'],['#7c3aed','#1a3a6e'],['#db2777','#f0c040'],['#059669','#1a3a6e'],['#d97706','#f0c040']];
  const ci=Math.abs(athlete.name.charCodeAt(0)+athlete.name.charCodeAt(1||0))%colors.length;
  const [c1,c2]=colors[ci];
  return `<div class="${cls}" style="background:linear-gradient(135deg,${c1},${c2})">${getInitials(athlete.name)}</div>`;
}
function datesBetween(start,end){
  const dates=[];let cur=new Date(start+'T00:00:00');const e=new Date(end+'T00:00:00');
  while(cur<=e){dates.push(cur.toISOString().split('T')[0]);cur.setDate(cur.getDate()+1)}
  return dates;
}

let currentPage='dashboard';

function hasTodayAttendance(){
  const t=today();
  const active=DB.athletes.filter(a=>a.active);
  if(!active.length)return true;
  return active.some(a=>DB.attendance.find(r=>r.athleteId===a.id&&r.date===t));
}

function renderSidebar(){
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML=NAV_ITEMS.map(item=>{
    const showDot=item.dot&&!hasTodayAttendance()&&DB.athletes.filter(a=>a.active).length>0;
    return `<div class="nav-item${currentPage===item.id?' active':''}" onclick="navigateTo('${item.id}')">
      <span class="nav-icon">${item.icon}</span>
      <span>${item.label}</span>
      ${showDot?'<span class="nav-dot"></span>':''}
    </div>`;
  }).join('');
}

function navigateTo(page){
  currentPage=page;
  renderSidebar();
  const item=NAV_ITEMS.find(n=>n.id===page);
  document.getElementById('topbar-title').textContent=item?item.label:'';
  // destroy all charts on page switch
  Object.keys(window.appCharts).forEach(k=>destroyChart(k));
  renderPage(page);
  closeSidebar();
}

function toggleSidebar(){
  const sidebar=document.getElementById('sidebar');
  const ham=document.getElementById('hamburger');
  sidebar.classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
  ham.setAttribute('aria-expanded', sidebar.classList.contains('open'));
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
  document.getElementById('hamburger').setAttribute('aria-expanded','false');
}

function renderDashboard(el,actions){
  const active=DB.athletes.filter(a=>a.active);
  const t=today();
  const todayAtt=DB.attendance.filter(a=>a.date===t);
  const todayPct=active.length?Math.round(todayAtt.filter(a=>a.present).length/active.length*100):0;
  const activeInjuries=DB.injuries.filter(i=>i.status==='active').length;
  const activeGoals=DB.goals.filter(g=>g.status==='active');

  el.innerHTML=`
  <div class="stat-grid">
    <div class="stat-card accent"><div class="stat-icon">👥</div><div class="stat-val">${DB.athletes.length}</div><div class="stat-label">Toplam Sporcu</div></div>
    <div class="stat-card success"><div class="stat-icon">✅</div><div class="stat-val">${todayPct}%</div><div class="stat-label">Bugünkü Yoklama</div></div>
    <div class="stat-card cyan"><div class="stat-icon">🏃</div><div class="stat-val">${active.length}</div><div class="stat-label">Aktif Sporcu</div></div>
    <div class="stat-card danger"><div class="stat-icon">🤕</div><div class="stat-val">${activeInjuries}</div><div class="stat-label">Aktif Sakatlık</div></div>
  </div>
  <div class="grid-2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-title">📊 Bugünkü Yoklama - Branş Bazlı</div>
      <div class="chart-wrap"><canvas id="chart-dash-att" height="220"></canvas></div>
      <div style="margin-top:12px;text-align:center"><button class="btn btn-ghost btn-sm" onclick="navigateTo('attendance')">Yoklamaya Git →</button></div>
    </div>
    <div class="card">
      <div class="card-title">📝 Son Gelişim Notları</div>
      <div id="dash-dev-notes"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🎯 Aktif Hedefler</div>
    <div id="dash-goals"></div>
  </div>`;

  // Doughnut chart - branch attendance today
  setTimeout(()=>{
    const ctx=document.getElementById('chart-dash-att');
    if(!ctx)return;
    const branchData=BRANCHES.map(b=>{
      const bathletes=active.filter(a=>a.branch===b);
      if(!bathletes.length)return null;
      const present=bathletes.filter(a=>todayAtt.find(r=>r.athleteId===a.id&&r.present)).length;
      return{label:b,present,total:bathletes.length};
    }).filter(Boolean);
    if(!branchData.length){ctx.parentElement.innerHTML='<div class="empty-state" style="padding:30px"><div class="empty-icon">📊</div><div>Henüz yoklama alınmadı</div></div>';return;}
    destroyChart('dash-att');
    window.appCharts['dash-att']=new Chart(ctx,{
      type:'doughnut',
      data:{labels:branchData.map(b=>b.label),datasets:[{data:branchData.map(b=>b.present),backgroundColor:CHART_COLORS,borderColor:'#111827',borderWidth:2}]},
      options:{...chartDefaults(),plugins:{...chartDefaults().plugins,legend:{position:'right',labels:{color:'#e2e8f0',font:{size:11}}}}}
    });
  },50);

  // Dev notes
  const notesEl=document.getElementById('dash-dev-notes');
  const lastNotes=DB.development.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  if(!lastNotes.length){notesEl.innerHTML='<div class="empty-state" style="padding:20px"><div class="empty-icon" style="font-size:32px">📝</div><div>Henüz not yok</div></div>';return;}
  notesEl.innerHTML=lastNotes.map(n=>{
    const a=getAthlete(n.athleteId);
    const badges={pos:'<span class="badge badge-success">✅ Pozitif</span>',neg:'<span class="badge badge-danger">❌ Negatif</span>',note:'<span class="badge badge-primary">📝 Not</span>'};
    return `<div class="dev-note" style="margin-bottom:8px">
      ${a?avatarHtml(a,'sm'):'<div class="avatar avatar-sm">?</div>'}
      <div class="dev-note-body">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">${badges[n.type]||''}<span style="font-size:13px;font-weight:600">${escHtml(a?a.name:'?')}</span></div>
        <div class="dev-note-text">${escHtml(n.text)}</div>
        <div class="dev-note-meta">${formatDate(n.date)}</div>
      </div>
    </div>`;
  }).join('');

  // Goals
  const goalsEl=document.getElementById('dash-goals');
  if(!activeGoals.length){goalsEl.innerHTML='<div style="color:var(--muted);font-size:13px;padding:10px 0">Aktif hedef bulunmuyor.</div>';return;}
  goalsEl.innerHTML=activeGoals.slice(0,6).map(g=>{
    const a=getAthlete(g.athleteId);const mt=getMeasureType(g.typeId);
    if(!a||!mt)return'';
    const lastM=DB.measurements.filter(m=>m.athleteId===g.athleteId&&m.typeId===g.typeId).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const cur=lastM?lastM.value:g.startValue||0;
    let pct=0;
    if(mt.higherIsBetter){pct=Math.max(0,Math.min(100,Math.round((cur-g.startValue)/(g.targetValue-g.startValue)*100)));}
    else{pct=Math.max(0,Math.min(100,Math.round((g.startValue-cur)/(g.startValue-g.targetValue)*100)));}
    if(isNaN(pct))pct=0;
    const days=Math.ceil((new Date(g.targetDate)-new Date())/86400000);
    return `<div class="goal-item">
      <div class="goal-header">
        <span class="goal-label">${escHtml(a.name)} - ${escHtml(mt.name)}</span>
        <span class="badge badge-primary">${days>0?days+' gün':'Süresi doldu'}</span>
      </div>
      <div class="goal-values">${cur} ${mt.unit} → ${g.targetValue} ${mt.unit} (Hedef: ${formatDate(g.targetDate)})</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="progress-wrap"><div class="progress-bar${pct>=100?' success':''}" style="width:${pct}%"></div></div>
        <span style="font-size:12px;color:var(--muted);white-space:nowrap">${pct}%</span>
      </div>
    </div>`;
  }).join('');
}

  renderAttTabContent();
}

function renderAttTabContent(){
  // update tab styles
  document.querySelectorAll('#page-content .tab-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',(i===0&&attTab==='daily')||(i===1&&attTab==='history'));
  });
  const el=document.getElementById('att-tab-content');
  if(attTab==='daily')renderAttGrid();
  else renderAttHistory(el);
}

function changeAttDate(delta){
  const d=new Date(attDate+'T00:00:00');d.setDate(d.getDate()+delta);
  attDate=d.toISOString().split('T')[0];
  document.getElementById('att-date-display').textContent=formatDate(attDate);
  renderAttGrid();
  renderSidebar();
}

function renderAttGrid(){
  const el=document.getElementById('att-tab-content');if(!el)return;
  let athletes=DB.athletes.filter(a=>a.active);
  if(attBranchFilter)athletes=athletes.filter(a=>a.branch===attBranchFilter);
  if(!athletes.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Sporcu bulunamadı</div></div>';return;}

  const presentCount=athletes.filter(a=>getAttRecord(a.id,attDate)?.present).length;
  const pct=Math.round(presentCount/athletes.length*100);

  el.innerHTML=`
  <div class="att-grid" id="att-grid-inner">
    ${athletes.map(a=>{
      const rec=getAttRecord(a.id,attDate);
      const present=rec?.present||false;
      return `<div class="att-row">
        ${avatarHtml(a,'sm')}
        <div class="att-info"><div class="att-name">${escHtml(a.name)}</div><div class="att-branch-tag">${escHtml(a.branch)}</div></div>
        <button class="att-toggle ${present?'present':'absent'}" onclick="toggleAtt('${a.id}')">${present?'✓ Geldi':'✗ Gelmedi'}</button>
      </div>`;
    }).join('')}
  </div>
  <div class="card2" style="margin-top:14px;display:flex;gap:24px;align-items:center;flex-wrap:wrap">
    <div><span style="font-size:22px;font-weight:800;color:var(--success)">${presentCount}</span><span style="font-size:12px;color:var(--muted);margin-left:6px">Geldi</span></div>
    <div><span style="font-size:22px;font-weight:800;color:var(--danger)">${athletes.length-presentCount}</span><span style="font-size:12px;color:var(--muted);margin-left:6px">Gelmedi</span></div>
    <div><span style="font-size:22px;font-weight:800;color:var(--accent)">${pct}%</span><span style="font-size:12px;color:var(--muted);margin-left:6px">Katılım</span></div>
  </div>`;
}

function getAttRecord(athleteId,date){
  return DB.attendance.find(a=>a.athleteId===athleteId&&a.date===date);
}

function toggleAtt(athleteId){
  const rec=getAttRecord(athleteId,attDate);
  if(rec){rec.present=!rec.present;}
  else{DB.attendance.push({id:genId(),athleteId,date:attDate,present:true,note:''});}
  saveData();renderAttGrid();renderSidebar();
}

function markAllPresent(){
  const athletes=DB.athletes.filter(a=>a.active&&(!attBranchFilter||a.branch===attBranchFilter));
  athletes.forEach(a=>{
    const rec=getAttRecord(a.id,attDate);
    if(rec)rec.present=true;
    else DB.attendance.push({id:genId(),athleteId:a.id,date:attDate,present:true,note:''});
  });
  saveData();renderAttGrid();renderSidebar();
}
function markAllAbsent(){
  const athletes=DB.athletes.filter(a=>a.active&&(!attBranchFilter||a.branch===attBranchFilter));
  athletes.forEach(a=>{
    const rec=getAttRecord(a.id,attDate);
    if(rec)rec.present=false;
    else DB.attendance.push({id:genId(),athleteId:a.id,date:attDate,present:false,note:''});
  });
  saveData();renderAttGrid();renderSidebar();
}

function renderAttHistory(el){
  // last 30 days
  const end=today();const startD=new Date();startD.setDate(startD.getDate()-29);
  const start=startD.toISOString().split('T')[0];
  const dates=datesBetween(start,end).reverse();
  const athletes=DB.athletes.filter(a=>a.active&&(!attBranchFilter||a.branch===attBranchFilter));

  el.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>Sporcu</th><th>Branş</th>${dates.slice(0,15).map(d=>`<th>${d.slice(5)}</th>`).join('')}</tr></thead>
    <tbody>${athletes.map(a=>`<tr>
      <td style="font-weight:600;white-space:nowrap">${escHtml(a.name)}</td>
      <td><span class="badge badge-primary">${escHtml(a.branch)}</span></td>
      ${dates.slice(0,15).map(d=>{const r=getAttRecord(a.id,d);return `<td style="text-align:center">${r?r.present?'<span style="color:var(--success)">✓</span>':'<span style="color:var(--danger)">✗</span>':'<span style="color:var(--border)">-</span>'}</td>`;}).join('')}
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function renderMeasChart(){
  const chartArea=document.getElementById('meas-chart-area');
  const tableArea=document.getElementById('meas-table-area');
  if(!chartArea)return;
  if(!measAthleteId||!measTypeId){chartArea.innerHTML='';tableArea.innerHTML='';return;}
  const mt=getMeasureType(measTypeId);
  const data=DB.measurements.filter(m=>m.athleteId===measAthleteId&&m.typeId===measTypeId).sort((a,b)=>a.date.localeCompare(b.date));

  chartArea.innerHTML=`<div class="card"><div class="card-title">${escHtml(mt?mt.name:'Ölçüm')} Grafiği</div><div class="chart-wrap"><canvas id="meas-chart" height="200"></canvas></div></div>`;

  setTimeout(()=>{
    const ctx=document.getElementById('meas-chart');if(!ctx)return;
    destroyChart('meas-main');
    if(!data.length){ctx.parentElement.innerHTML='<div class="empty-state" style="padding:30px"><div class="empty-icon">📏</div><div>Henüz ölçüm yok</div></div>';return;}
    window.appCharts['meas-main']=new Chart(ctx,{
      type:'line',
      data:{
        labels:data.map(d=>d.date.slice(5)),
        datasets:[{label:mt?mt.name+' ('+mt.unit+')':'',data:data.map(d=>d.value),borderColor:'#c8102e',backgroundColor:'rgba(200,16,46,.1)',borderWidth:2,pointBackgroundColor:'#f0c040',pointRadius:5,tension:.3,fill:true}]
      },
      options:{...chartDefaults(),scales:darkScales()}
    });
  },50);

  if(!tableArea)return;
  tableArea.innerHTML=`<div class="card">
    <div class="card-title">Ölçüm Geçmişi</div>
    ${data.length?`<div class="table-wrap"><table>
      <thead><tr><th>Tarih</th><th>Değer</th><th>Değişim</th><th></th></tr></thead>
      <tbody>${data.slice().reverse().map((m,i,arr)=>{
        const prev=arr[i+1];
        const diff=prev?m.value-prev.value:null;
        let diffHtml='';
        if(diff!==null){
          const better=(mt?.higherIsBetter&&diff>0)||(!mt?.higherIsBetter&&diff<0);
          diffHtml=`<span style="color:${diff===0?'var(--muted)':better?'var(--success)':'var(--danger)'}">${diff>0?'+':''}${diff.toFixed(2)} ${mt?mt.unit:''}</span>`;
        }
        return `<tr><td>${formatDate(m.date)}</td><td><strong>${m.value} ${mt?mt.unit:''}</strong></td><td>${diffHtml||'—'}</td><td><button class="btn btn-danger btn-xs" onclick="deleteMeasurement('${m.id}')">Sil</button></td></tr>`;
      }).join('')}
      </tbody>
    </table></div>`:
    '<div style="color:var(--muted);font-size:13px;padding:10px 0">Henüz ölçüm kaydı yok.</div>'}
  </div>`;
}

let goalAthleteId='';

function renderGoals(el,actions){
  actions.innerHTML=`<button class="btn btn-accent" onclick="openAddGoalModal()">+ Hedef Ekle</button>`;
  el.innerHTML=`
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">Sporcu Seç</div>
    <select class="form-control" id="goal-ath-sel" onchange="goalAthleteId=this.value;renderGoalsList()" style="max-width:300px">
      <option value="">-- Tüm Sporcular --</option>
      ${DB.athletes.map(a=>`<option value="${a.id}"${goalAthleteId===a.id?' selected':''}>${escHtml(a.name)} (${escHtml(a.branch)})</option>`).join('')}
    </select>
  </div>
  <div id="goals-list"></div>`;
  renderGoalsList();
}

function renderGoalsList(){
  const el=document.getElementById('goals-list');if(!el)return;
  let goals=DB.goals;
  if(goalAthleteId)goals=goals.filter(g=>g.athleteId===goalAthleteId);

  // Auto check achieved/failed
  goals.forEach(g=>{
    if(g.status!=='active')return;
    const mt=getMeasureType(g.typeId);if(!mt)return;
    const lastM=DB.measurements.filter(m=>m.athleteId===g.athleteId&&m.typeId===g.typeId).sort((a,b)=>b.date.localeCompare(a.date))[0];
    if(lastM){
      const cur=lastM.value;
      if((mt.higherIsBetter&&cur>=g.targetValue)||(!mt.higherIsBetter&&cur<=g.targetValue)){g.status='achieved';saveData();}
    }
    if(new Date(g.targetDate)<new Date()&&g.status==='active'){g.status='failed';saveData();}
  });

  const active=goals.filter(g=>g.status==='active');
  const done=goals.filter(g=>g.status!=='active');

  let html='';
  if(!active.length&&!done.length){html='<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-title">Henüz hedef yok</div></div>';}

  if(active.length){
    html+=`<div class="section-title" style="margin-bottom:10px">Aktif Hedefler</div>`;
    html+=active.map(g=>goalCard(g)).join('');
  }
  if(done.length){
    html+=`<details style="margin-top:16px"><summary style="cursor:pointer;color:var(--muted);font-size:13px;font-weight:700;margin-bottom:10px;outline:none">Tamamlanan/Başarısız (${done.length})</summary>
    <div style="margin-top:10px">${done.map(g=>goalCard(g)).join('')}</div></details>`;
  }
  el.innerHTML=html;
}

function goalCard(g){
  const a=getAthlete(g.athleteId);const mt=getMeasureType(g.typeId);
  if(!a||!mt)return'';
  const lastM=DB.measurements.filter(m=>m.athleteId===g.athleteId&&m.typeId===g.typeId).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const cur=lastM?lastM.value:(g.startValue||0);
  let pct=0;
  if(mt.higherIsBetter&&g.targetValue!==g.startValue){pct=Math.max(0,Math.min(100,Math.round((cur-g.startValue)/(g.targetValue-g.startValue)*100)));}
  else if(!mt.higherIsBetter&&g.startValue!==g.targetValue){pct=Math.max(0,Math.min(100,Math.round((g.startValue-cur)/(g.startValue-g.targetValue)*100)));}
  if(isNaN(pct))pct=0;
  const days=Math.ceil((new Date(g.targetDate)-new Date())/86400000);
  const statusBadge={active:'<span class="badge badge-primary">Aktif</span>',achieved:'<span class="badge badge-success">✅ Başarıldı</span>',failed:'<span class="badge badge-danger">❌ Başarısız</span>'}[g.status]||'';
  const barClass=g.status==='achieved'?'success':g.status==='failed'?'danger':pct>70?'success':pct>40?'warning':'';
  return `<div class="goal-item">
    <div class="goal-header">
      <div><span class="goal-label">${escHtml(a.name)}</span><span style="color:var(--muted);font-size:12px;margin-left:8px">${escHtml(mt.name)}</span></div>
      <div style="display:flex;gap:6px;align-items:center">${statusBadge}<button class="btn btn-danger btn-xs" onclick="deleteGoal('${g.id}')">Sil</button></div>
    </div>
    <div class="goal-values">Mevcut: <strong>${cur} ${mt.unit}</strong> → Hedef: <strong>${g.targetValue} ${mt.unit}</strong> | Bitiş: ${formatDate(g.targetDate)}</div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
      <div class="progress-wrap"><div class="progress-bar ${barClass}" style="width:${pct}%"></div></div>
      <span style="font-size:12px;color:var(--muted);white-space:nowrap">${pct}%</span>
      ${g.status==='active'?`<span class="goal-days">${days>0?days+' gün kaldı':'Süre doldu'}</span>`:''}
    </div>
    ${g.status==='active'?`<div style="margin-top:8px"><button class="btn btn-success btn-xs" onclick="achieveGoal('${g.id}')">✅ Başarıldı</button></div>`:''}
  </div>`;
}

function renderRepAttLine(){
  const ctx=document.getElementById('rep-att-line');if(!ctx)return;
  const dates=[];const d=new Date();
  for(let i=29;i>=0;i--){const dd=new Date(d);dd.setDate(dd.getDate()-i);dates.push(dd.toISOString().split('T')[0]);}
  const active=DB.athletes.filter(a=>a.active);
  const data=dates.map(date=>{
    if(!active.length)return 0;
    const recs=DB.attendance.filter(a=>a.date===date&&active.find(at=>at.id===a.athleteId));
    if(!recs.length)return null;
    return Math.round(recs.filter(r=>r.present).length/active.length*100);
  });
  destroyChart('rep-att-line');
  window.appCharts['rep-att-line']=new Chart(ctx,{
    type:'line',
    data:{labels:dates.map(d=>d.slice(5)),datasets:[{label:'Katılım %',data,borderColor:'#c8102e',backgroundColor:'rgba(200,16,46,.1)',borderWidth:2,tension:.3,fill:true,spanGaps:true,pointRadius:3,pointBackgroundColor:'#f0c040'}]},
    options:{...chartDefaults(),scales:darkScales()}
  });
}

function renderRepBranchBar(){
  const ctx=document.getElementById('rep-branch-bar');if(!ctx)return;
  const endD=new Date();const startD=new Date();startD.setDate(startD.getDate()-30);
  const data=BRANCHES.map(b=>{
    const bathletes=DB.athletes.filter(a=>a.active&&a.branch===b);
    if(!bathletes.length)return null;
    const recs=DB.attendance.filter(a=>bathletes.find(at=>at.id===a.athleteId)&&new Date(a.date)>=startD&&new Date(a.date)<=endD);
    if(!recs.length)return null;
    return{branch:b,pct:Math.round(recs.filter(r=>r.present).length/recs.length*100)};
  }).filter(Boolean);
  if(!data.length){ctx.parentElement.innerHTML='<div class="empty-state" style="padding:30px"><div class="empty-icon">📊</div><div>Yeterli veri yok</div></div>';return;}
  destroyChart('rep-branch-bar');
  window.appCharts['rep-branch-bar']=new Chart(ctx,{
    type:'bar',
    data:{labels:data.map(d=>d.branch),datasets:[{label:'Katılım %',data:data.map(d=>d.pct),backgroundColor:CHART_COLORS,borderRadius:6}]},
    options:{...chartDefaults(),indexAxis:'y',scales:{x:{...darkScales().x,min:0,max:100,ticks:{...darkScales().x.ticks,callback:v=>v+'%'}},y:darkScales().y}}
  });
}

function renderRepTopAtt(){
  const ctx=document.getElementById('rep-top-att');if(!ctx)return;
  const athletes=DB.athletes.filter(a=>a.active).map(a=>{
    const r=getAttRate(a.id,30);
    return{name:a.name,rate:r!==null?r:0};
  }).sort((a,b)=>b.rate-a.rate).slice(0,10);
  if(!athletes.length){ctx.parentElement.innerHTML='<div class="empty-state" style="padding:30px"><div class="empty-icon">🏃</div><div>Yeterli veri yok</div></div>';return;}
  destroyChart('rep-top-att');
  window.appCharts['rep-top-att']=new Chart(ctx,{
    type:'bar',
    data:{labels:athletes.map(a=>a.name),datasets:[{label:'Katılım % (30 gün)',data:athletes.map(a=>a.rate),backgroundColor:athletes.map((a,i)=>CHART_COLORS[i%CHART_COLORS.length]),borderRadius:6}]},
    options:{...chartDefaults(),scales:{x:{...darkScales().x,ticks:{...darkScales().x.ticks,maxRotation:30}},y:{...darkScales().y,min:0,max:100,ticks:{...darkScales().y.ticks,callback:v=>v+'%'}}}}
  });
}

function renderRepCompBranch(){
  const ctx=document.getElementById('rep-comp-branch');if(!ctx)return;
  const data=BRANCHES.map(b=>{
    const athletes=DB.athletes.filter(a=>a.branch===b).map(a=>a.id);
    const comps=DB.competitions.filter(c=>athletes.includes(c.athleteId));
    const gold=comps.filter(c=>c.rank===1).length;
    const silver=comps.filter(c=>c.rank===2).length;
    const bronze=comps.filter(c=>c.rank===3).length;
    const other=comps.filter(c=>c.rank&&c.rank>3).length;
    if(!comps.length)return null;
    return{branch:b,gold,silver,bronze,other};
  }).filter(Boolean);
  if(!data.length){ctx.parentElement.innerHTML='<div class="empty-state" style="padding:30px"><div class="empty-icon">🏆</div><div>Yarışma verisi yok</div></div>';return;}
  destroyChart('rep-comp-branch');
  window.appCharts['rep-comp-branch']=new Chart(ctx,{
    type:'bar',
    data:{
      labels:data.map(d=>d.branch),
      datasets:[
        {label:'Altın',data:data.map(d=>d.gold),backgroundColor:'#FFD700',borderRadius:4},
        {label:'Gümüş',data:data.map(d=>d.silver),backgroundColor:'#C0C0C0',borderRadius:4},
        {label:'Bronz',data:data.map(d=>d.bronze),backgroundColor:'#CD7F32',borderRadius:4},
        {label:'Diğer',data:data.map(d=>d.other),backgroundColor:'#64748b',borderRadius:4},
      ]
    },
    options:{...chartDefaults(),scales:darkScales()}
  });
}

  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this)closeModal(id);
  });
});

// ESC key
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    ['modal-athlete','modal-detail','modal-generic'].forEach(id=>closeModal(id));
  }
});

// ============================================================
// INIT
// ============================================================
function init(){
  renderSidebar();
  navigateTo('dashboard');
}

init();
</script>
</body>
</html>
