<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 142">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="110%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#c8920a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield outer (gold border) -->
  <path d="M8,4 L112,4 L112,92 Q112,130 60,142 Q8,130 8,92 Z" fill="url(#gold)"/>
  <!-- Shield inner (navy) -->
  <path d="M13,9 L107,9 L107,90 Q107,125 60,136 Q13,125 13,90 Z" fill="url(#bg)"/>

  <!-- Top banner stripe -->
  <path d="M13,9 L107,9 L107,34 L13,34 Z" fill="#f0c040" opacity="0.12"/>

  <!-- DPÜ big text -->
  <text x="60" y="31" text-anchor="middle"
        font-family="'Arial Black','Impact',sans-serif"
        font-weight="900" font-size="22" fill="url(#gold)"
        letter-spacing="4" filter="url(#glow)">DPÜ</text>

  <!-- Horizontal divider line -->
  <line x1="18" y1="37" x2="102" y2="37" stroke="#f0c040" stroke-width="1.2" opacity="0.7"/>

  <!-- Stars -->
  <text x="60" y="52" text-anchor="middle"
        font-family="serif" font-size="11" fill="#f0c040" letter-spacing="6">★★★</text>

  <!-- SPOR KULÜBÜ -->
  <text x="60" y="68" text-anchor="middle"
        font-family="Arial,sans-serif" font-weight="700"
        font-size="9.5" fill="#ffffff" letter-spacing="2">SPOR KULÜBÜ</text>

  <!-- Second divider -->
  <line x1="22" y1="74" x2="98" y2="74" stroke="#f0c040" stroke-width="0.8" opacity="0.5"/>

  <!-- 1994 -->
  <text x="60" y="87" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9"
        fill="#f0c040" letter-spacing="4" opacity="0.9">1994</text>

  <!-- DUMLUPINAR -->
  <text x="60" y="104" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="6.5"
        fill="rgba(255,255,255,0.65)" letter-spacing="1.2">DUMLUPINAR</text>

  <!-- ÜNİVERSİTESİ -->
  <text x="60" y="116" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="5.8"
        fill="rgba(255,255,255,0.5)" letter-spacing="0.8">ÜNİVERSİTESİ</text>
</svg>
