<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="55%" stop-color="#0d2b7a"/>
      <stop offset="100%" stop-color="#050e2e"/>
    </radialGradient>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="50%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#c8890a"/>
    </linearGradient>
    <linearGradient id="ringG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06d6f0"/>
      <stop offset="50%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#06d6f0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="60" cy="60" r="59" fill="rgba(6,182,212,0.18)"/>

  <!-- Outer color ring -->
  <circle cx="60" cy="60" r="57" fill="none" stroke="url(#ringG)" stroke-width="7" stroke-linecap="round"/>

  <!-- White separator -->
  <circle cx="60" cy="60" r="53" fill="none" stroke="white" stroke-width="1.2" opacity="0.35"/>

  <!-- Main circle -->
  <circle cx="60" cy="60" r="51" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Inner shine highlight -->
  <ellipse cx="44" cy="36" rx="22" ry="13" fill="white" opacity="0.07"/>

  <!-- Fun dots on ring -->
  <circle cx="60" cy="4"   r="3.5" fill="#06d6f0"/>
  <circle cx="60" cy="116" r="3.5" fill="#06d6f0"/>
  <circle cx="4"  cy="60"  r="3.5" fill="#f0c040"/>
  <circle cx="116" cy="60" r="3.5" fill="#f0c040"/>
  <circle cx="17"  cy="17" r="2.8" fill="#f0c040"/>
  <circle cx="103" cy="17" r="2.8" fill="#f0c040"/>
  <circle cx="17"  cy="103" r="2.8" fill="#06d6f0"/>
  <circle cx="103" cy="103" r="2.8" fill="#06d6f0"/>

  <!-- SPOR label top -->
  <text x="60" y="31" text-anchor="middle"
        font-family="Arial,sans-serif" font-weight="700"
        font-size="8.5" fill="rgba(255,255,255,0.7)" letter-spacing="4.5">SPOR</text>

  <!-- Gold line top -->
  <line x1="24" y1="37" x2="96" y2="37" stroke="#f0c040" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>

  <!-- Star left -->
  <text x="27" y="62" text-anchor="middle" font-size="9" fill="#f0c040" filter="url(#softGlow)">★</text>
  <!-- Star right -->
  <text x="93" y="62" text-anchor="middle" font-size="9" fill="#f0c040" filter="url(#softGlow)">★</text>

  <!-- DPÜ big centered -->
  <text x="60" y="72" text-anchor="middle"
        font-family="'Arial Black','Impact',sans-serif"
        font-weight="900" font-size="30" fill="url(#goldG)"
        letter-spacing="3" filter="url(#softGlow)">DPÜ</text>

  <!-- Gold line bottom -->
  <line x1="20" y1="78" x2="100" y2="78" stroke="#f0c040" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>

  <!-- KULÜBÜ label -->
  <text x="60" y="92" text-anchor="middle"
        font-family="Arial,sans-serif" font-weight="700"
        font-size="8.5" fill="rgba(255,255,255,0.7)" letter-spacing="3">KULÜBÜ</text>

  <!-- 1994 tiny -->
  <text x="60" y="107" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="7"
        fill="#f0c040" letter-spacing="4" opacity="0.75">1994</text>
</svg>
